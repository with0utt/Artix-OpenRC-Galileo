name: Lint & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    name: Shellcheck (Bash Scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all scripts
        run: shellcheck scripts/*.sh scripts/steamos-session-helper scripts/steamos-session-select configs/gamescope-session.sh
        continue-on-error: false

  markdownlint:
    name: Markdownlint (Documentation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint '**/*.md'
        continue-on-error: false

  markdown-link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check links in markdown files
        run: |
          for file in docs/*.md README.md TROUBLESHOOTING.md; do
            if [ -f "$file" ]; then
              echo "Checking links in $file"
              markdown-link-check "$file" || exit 1
            fi
          done
        continue-on-error: false
